<!DOCTYPE html>
<!-- redeploy -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Swerve — Research Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at 20% 30%, rgba(99,102,241,0.15), transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(59,130,246,0.15), transparent 40%),
              #000;
  color:#fafafa;
  overflow-x:hidden;
  max-width:100vw;
  -webkit-font-smoothing:antialiased;
}
input,select,textarea,button{font-family:'Poppins',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#000}
::-webkit-scrollbar-thumb{background:#27272a;border-radius:4px}

.card{
  background:rgba(24,24,27,.95);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  overflow:hidden;
}
.card-sharp{
  background:rgba(24,24,27,.95);
  border:1px solid rgba(255,255,255,.08);
  border-radius:8px;
  overflow:hidden;
}
button{transition:all .2s ease}

.gt{
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.55) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.gt-purple{
  background:linear-gradient(135deg,#9666e3,#1892f3);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.grid-bg{
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:40px 40px;
}
.lbl{
  font-size:.8rem;font-weight:600;letter-spacing:.2em;
  text-transform:uppercase;color:rgba(150,102,227,.9);
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.aBlink{animation:blink 1.3s ease-in-out infinite}
@keyframes spinSlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.aSpin{animation:spinSlow 1s linear infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp .35s ease both}

/* choice / category / item cards */
.tile{
  background:rgba(24,24,27,.95);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;cursor:pointer;text-align:left;color:#fafafa;
  transition:border-color .2s,transform .2s,background .2s;
}
.tile:hover{border-color:rgba(150,102,227,.55);transform:translateY(-3px);background:rgba(32,32,38,.97)}

/* news item */
.newsItem{
  display:block;border:1px solid rgba(255,255,255,.06);border-radius:12px;
  padding:13px 14px;background:rgba(255,255,255,.02);text-decoration:none;color:inherit;
  transition:border-color .2s,background .2s;
}
.newsItem:hover{border-color:rgba(24,146,243,.45);background:rgba(255,255,255,.04)}

/* generic json renderer */
.jblock{border-left:2px solid rgba(150,102,227,.35);padding:2px 0 2px 14px;margin:10px 0}
.jkey{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(150,102,227,.85);margin-bottom:4px}
.jval{font-size:.93rem;line-height:1.7;color:rgba(255,255,255,.85)}
.jcard{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 16px;margin:10px 0}
.chip{display:inline-block;font-size:.66rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 9px;border-radius:999px;margin:0 6px 6px 0}
.chip-bull{background:rgba(34,197,94,.14);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.chip-bear{background:rgba(239,68,68,.14);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.chip-neu{background:rgba(148,163,184,.14);color:#cbd5e1;border:1px solid rgba(148,163,184,.3)}
.chip-info{background:rgba(24,146,243,.14);color:#60a5fa;border:1px solid rgba(24,146,243,.3)}
.chip-code{background:rgba(150,102,227,.12);color:#b48cf0;border:1px solid rgba(150,102,227,.3);font-family:ui-monospace,Menlo,monospace;letter-spacing:0}
.grpHead{font-size:.78rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(255,255,255,.45);margin:22px 0 12px;display:flex;align-items:center;gap:10px}
.grpHead:after{content:"";flex:1;height:1px;background:rgba(255,255,255,.08)}

.sectionTitle{font-size:1.05rem;font-weight:700;margin:6px 0 2px;letter-spacing:-.01em}
.crumb{background:none;border:none;color:rgba(255,255,255,.55);cursor:pointer;font-size:.85rem;padding:0}
.crumb:hover{color:#fff}

@media(max-width:980px){
  .layout{grid-template-columns:1fr!important}
  .sidebar{position:static!important;height:auto!important;max-height:460px;order:2}
  .twcol{grid-template-columns:1fr!important}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useCallback,useMemo} = React;

/* ── Supabase (macro / commodity research project) ── */
const SB_URL="https://ipqaunjigheamjtxrlyo.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwcWF1bmppZ2hlYW1qdHhybHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxODE4OTIsImV4cCI6MjA4Nzc1Nzg5Mn0.u9DhtiMoTMhl4h9D_3cHzBDdXaZcFXumuE2buJzFTZU";
const sb=window.supabase.createClient(SB_URL,SB_KEY);

const P="#9666e3",B="#1892f3";

/* ── Field lists ── */
const COMMODITY_FIELDS=["commodity_id","name","category","last_enriched_at","market_overview","house_view","analyst_take","snapshot","confidence","demand_drivers","supply","geographic_outlook","trade_effects","india_impact","outlook","risks"];
const MACRO_FIELDS=["uid","name","explanation","frequency","last_enriched_at","house_view","analyst_take","snapshot","confidence","drivers","performance","policy_landscape","subsectors","corporate_landscape","external_linkages","outlook","risks"];

/* fields rendered as a section in the detail body (label + content). meta fields shown in header instead */
const COMMODITY_META=["commodity_id","name","category","last_enriched_at"];
const MACRO_META=["uid","name","frequency","last_enriched_at"];

/* ── Commodity category -> clean group ── */
const COMMODITY_GROUPS=[
  {label:"Metals & Mining",emoji:"⛏️",cats:["metals","metal","precious metal"]},
  {label:"Energy",emoji:"⚡",cats:["energy"]},
  {label:"Agriculture",emoji:"🌾",cats:["agricultural"]},
  {label:"Livestock",emoji:"🐄",cats:["livestock"]},
  {label:"Fertilizers",emoji:"🧪",cats:["fertilizer"]},
  {label:"Industrial & Chemicals",emoji:"🏭",cats:["industrial","industrial gas","petrochemical"]},
  {label:"Pharma & Health",emoji:"💊",cats:["pharmaceutical api","nutraceutical","botanical/herbal","healthcare consumable"]},
  {label:"Timber & Wood",emoji:"🪵",cats:["timber"]},
  {label:"Indices",emoji:"📊",cats:["index"]},
];
function commodityGroupFor(cat){
  const c=(cat||"").trim().toLowerCase();
  const g=COMMODITY_GROUPS.find(g=>g.cats.includes(c));
  return g?g.label:"Other";
}

/* ── Macro uid-prefix -> clean group (per attached Mirrority excel sheets) ── */
const MACRO_GROUPS=[
  {label:"Economic Performance",emoji:"📈",prefixes:["EP"]},
  {label:"Public Finance",emoji:"🏛️",prefixes:["PF"]},
  {label:"Money & Banking",emoji:"🏦",prefixes:["MB","RBI","DII","BFSI"]},
  {label:"Manufacturing & Trading",emoji:"🚢",prefixes:["MT","IT"]},
  {label:"Business & Industries",emoji:"🏢",prefixes:["BI","TC","VEH","FUEL","CD","CS","AIR"]},
  {label:"Competition & Innovation",emoji:"💡",prefixes:["CI"]},
  {label:"Health",emoji:"🩺",prefixes:["HE","HC"]},
];
function macroGroupFor(uid){
  const p=(uid||"").split("-")[0].toUpperCase();
  const g=MACRO_GROUPS.find(g=>g.prefixes.includes(p));
  return g?g.label:"Other";
}

/* ── Helpers ── */
function titleCase(s){return (s||"").replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());}
function fmtDate(d){
  if(!d)return "";
  try{const dt=new Date(d);return dt.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});}catch(e){return d;}
}
function fmtDateTime(d){
  if(!d)return "";
  try{const dt=new Date(d);return dt.toLocaleString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});}catch(e){return d;}
}
function signChip(v){
  const s=(v||"").toString().toLowerCase();
  if(s.includes("bull")||s==="above")return "chip-bull";
  if(s.includes("bear")||s==="below")return "chip-bear";
  if(["high","med","medium","low"].includes(s))return "chip-info";
  return "chip-neu";
}
/* ── Sector level labels / stance labels ── */
const LEVEL_LABEL={SE:"Sector",IG:"Industry Group",IN:"Industry"};
const STANCE_LABEL={positive:"Positive",cautious_positive:"Cautiously Positive",neutral:"Neutral",
  cautious_negative:"Cautiously Negative",negative:"Negative"};
function sentimentChip(v){
  const s=(v||"").toString().toLowerCase();
  const bull=s.includes("bull")||s.includes("positive")||s.includes("tailwind");
  const bear=s.includes("bear")||s.includes("negative")||s.includes("headwind");
  if(bull&&!bear)return "chip-bull";
  if(bear&&!bull)return "chip-bear";
  return "chip-neu";
}
function stanceChip(v){
  const s=(v||"").toString().toLowerCase();
  if(s.includes("positive"))return "chip-bull";
  if(s.includes("negative"))return "chip-bear";
  return "chip-neu";
}
function asArray(v){
  if(!v)return [];
  if(Array.isArray(v))return v;
  if(typeof v==="string"){try{const p=JSON.parse(v);return Array.isArray(p)?p:[];}catch(e){return [];}}
  return [];
}
function asObject(v){
  if(!v)return {};
  if(typeof v==="object"&&!Array.isArray(v))return v;
  if(typeof v==="string"){try{const p=JSON.parse(v);return (p&&typeof p==="object"&&!Array.isArray(p))?p:{};}catch(e){return {};}}
  return {};
}

/* tokens for fuzzy news matching */
const STOP=new Set(["the","and","for","with","price","index","monthly","annual","total","india","indian","series","rate","oil","gas"]);
function baseName(name){
  return (name||"").toLowerCase().replace(/\(.*?\)/g,"").replace(/—.*$/,"").replace(/[^a-z0-9 ]/g," ").trim();
}
function tokens(name){
  return baseName(name).split(/\s+/).filter(w=>w.length>=4&&!STOP.has(w));
}
function newsMatchesItem(tagArr, itemName){
  if(!tagArr||!tagArr.length)return false;
  const base=baseName(itemName);
  const toks=tokens(itemName);
  for(let raw of tagArr){
    let t=(raw||"").toLowerCase().replace(/^confirmed:/,"").trim();
    if(!t)continue;
    if(base.includes(t)||t.includes(base))return true;
    const tt=t.split(/\s+/).filter(w=>w.length>=4&&!STOP.has(w));
    for(let a of toks)for(let b of tt)if(a===b)return true;
  }
  return false;
}

/* ════════════════════ Generic JSON renderer ════════════════════ */
function JsonValue({value}){
  if(value===null||value===undefined||value==="")return null;
  if(typeof value==="string"){
    return <p className="jval">{value}</p>;
  }
  if(typeof value==="number"||typeof value==="boolean"){
    return <p className="jval">{String(value)}</p>;
  }
  if(Array.isArray(value)){
    if(!value.length)return null;
    // array of scalars -> chips/list
    if(value.every(v=>typeof v==="string"||typeof v==="number")){
      return <ul style={{margin:"6px 0 6px 18px",padding:0}}>
        {value.map((v,i)=><li key={i} className="jval" style={{marginBottom:4}}>{String(v)}</li>)}
      </ul>;
    }
    return <div>{value.map((v,i)=><JsonCard key={i} obj={v}/>)}</div>;
  }
  // object
  return <JsonObject obj={value}/>;
}

function JsonCard({obj}){
  if(obj===null||typeof obj!=="object")return <JsonValue value={obj}/>;
  if(Array.isArray(obj))return <JsonValue value={obj}/>;
  const keys=Object.keys(obj).filter(k=>obj[k]!==null&&obj[k]!==""&&!(Array.isArray(obj[k])&&!obj[k].length)&&k!=="source_ids"&&k!=="source_id");
  // pick a heading-ish key
  const headKey=["category","stage","region","horizon","area","risk","country","name","project","title"].find(k=>typeof obj[k]==="string");
  const signVal=obj.sign||obj.skew||obj.direction||obj.position;
  return <div className="jcard fadeUp">
    {headKey&&<div style={{fontWeight:700,fontSize:".97rem",marginBottom:6}}>{obj[headKey]}</div>}
    {signVal&&<span className={"chip "+signChip(signVal)}>{signVal}</span>}
    {obj.magnitude&&<span className={"chip "+signChip(obj.magnitude)}>{obj.magnitude}</span>}
    {obj.persistence&&<span className="chip chip-neu">{obj.persistence}</span>}
    {keys.filter(k=>k!==headKey&&!["sign","skew","direction","position","magnitude","persistence"].includes(k)).map(k=>(
      <div key={k} style={{marginTop:8}}>
        <div className="jkey">{titleCase(k)}</div>
        <JsonValue value={obj[k]}/>
      </div>
    ))}
  </div>;
}

function JsonObject({obj}){
  const keys=Object.keys(obj).filter(k=>obj[k]!==null&&obj[k]!==""&&!(Array.isArray(obj[k])&&!obj[k].length)&&k!=="source_ids"&&k!=="source_id");
  return <div>
    {keys.map(k=>{
      const v=obj[k];
      if(typeof v==="string"||typeof v==="number"||typeof v==="boolean"){
        return <div key={k} className="jblock">
          <div className="jkey">{titleCase(k)}</div>
          <JsonValue value={v}/>
        </div>;
      }
      return <div key={k} style={{marginTop:10}}>
        <div className="jkey" style={{marginBottom:2}}>{titleCase(k)}</div>
        <JsonValue value={v}/>
      </div>;
    })}
  </div>;
}

/* a top-level detail field */
function DetailField({label,value}){
  if(value===null||value===undefined||value==="")return null;
  if(Array.isArray(value)&&!value.length)return null;
  if(typeof value==="object"&&!Array.isArray(value)&&!Object.keys(value).length)return null;
  return <div className="card" style={{padding:"20px 22px",marginBottom:16}}>
    <div className="sectionTitle gt-purple" style={{marginBottom:10}}>{label}</div>
    <JsonValue value={value}/>
  </div>;
}

/* ════════════════════ News sidebar ════════════════════ */
function NewsSidebar({mode,item,news,loading}){
  return <aside className="sidebar card" style={{
    position:"sticky",top:84,height:"calc(100vh - 104px)",
    display:"flex",flexDirection:"column",padding:0,overflow:"hidden"}}>
    <div style={{padding:"16px 18px",borderBottom:"1px solid rgba(255,255,255,.08)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",display:"inline-block"}} className="aBlink"></span>
        <span className="lbl" style={{color:"rgba(255,255,255,.85)"}}>
          {mode==="item"?"Related News":"Breaking News"}
        </span>
      </div>
      <div style={{fontSize:".78rem",color:"rgba(255,255,255,.4)",marginTop:4}}>
        {mode==="item"?("Tagged to "+(item?.name||"")):"Top stories right now"}
      </div>
    </div>
    <div style={{overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:10,flex:1}}>
      {loading&&<div style={{color:"rgba(255,255,255,.4)",fontSize:".85rem",padding:"8px 2px"}}>Loading…</div>}
      {!loading&&!news.length&&<div style={{color:"rgba(255,255,255,.4)",fontSize:".85rem",padding:"8px 2px"}}>
        {mode==="item"?"No tagged articles found for this item yet.":"No breaking news right now."}
      </div>}
      {news.map(n=>(
        <a key={n.id} className="newsItem" href={n.url||"#"} target="_blank" rel="noreferrer">
          <div style={{fontSize:".88rem",fontWeight:600,lineHeight:1.4,color:"#fafafa"}}>{n.title}</div>
          {n.snippet&&<div style={{fontSize:".76rem",color:"rgba(255,255,255,.45)",marginTop:5,lineHeight:1.5,
            display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{n.snippet}</div>}
          <div style={{fontSize:".7rem",color:"rgba(255,255,255,.35)",marginTop:7,display:"flex",gap:8,flexWrap:"wrap"}}>
            <span style={{color:"rgba(150,102,227,.85)"}}>{n.source_name||"—"}</span>
            <span>·</span>
            <span>{fmtDateTime(n.published_at||n.published)}</span>
          </div>
        </a>
      ))}
    </div>
  </aside>;
}

/* ════════════════════ Tiles ════════════════════ */
function BigChoice({onPick}){
  const opts=[
    {key:"commodity",title:"Commodities",tag:"Supply · Demand · India Impact",desc:"Metals, energy, agriculture, industrial and more — house views, supply/demand and India impact."},
    {key:"macro",title:"Macros",tag:"Growth · Money · Trade · Fiscal",desc:"Indian macroeconomic indicators across growth, money, banking, trade, public finance and health."},
    {key:"sector",title:"Sectors",tag:"Viewpoints · Headwinds · Tailwinds",desc:"Sectoral viewpoints and directional outlook with the headwinds and tailwinds shaping each industry."},
  ];
  return <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:20}}>
    {opts.map(o=>(
      <button key={o.key} className="tile fadeUp" style={{padding:"34px 30px",minHeight:220,
        display:"flex",flexDirection:"column",justifyContent:"space-between"}} onClick={()=>onPick(o.key)}>
        <div className="lbl" style={{fontSize:".66rem"}}>{o.tag}</div>
        <div>
          <div style={{fontSize:"1.6rem",fontWeight:800,letterSpacing:"-.02em"}} className="gt">{o.title}</div>
          <div style={{fontSize:".92rem",color:"rgba(255,255,255,.5)",marginTop:10,lineHeight:1.6}}>{o.desc}</div>
          <div style={{marginTop:18,color:B,fontSize:".85rem",fontWeight:600}}>Explore →</div>
        </div>
      </button>
    ))}
  </div>;
}

/* ════════════════════ Sector tiles & detail ════════════════════ */
function SectorGrid({sectors,onPick}){
  return <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:16}}>
    {sectors.map(s=>(
      <button key={s.sector_code} className="tile fadeUp" style={{padding:"22px 22px",minHeight:130,
        display:"flex",flexDirection:"column",justifyContent:"space-between"}} onClick={()=>onPick(s)}>
        <span className="chip chip-code" style={{margin:0}}>{s.sector_code}</span>
        <div>
          <div style={{fontSize:"1.12rem",fontWeight:700,letterSpacing:"-.01em",lineHeight:1.3}}>{s.name}</div>
          <div style={{fontSize:".78rem",color:"rgba(255,255,255,.4)",marginTop:6}}>
            {s.industryCount} {s.industryCount===1?"industry":"industries"}
          </div>
        </div>
      </button>
    ))}
  </div>;
}

function SectorTile({node,outlook,onPick,groupLevel}){
  return <button className="tile fadeUp" style={{padding:"16px 18px",minHeight:96,
    display:"flex",flexDirection:"column",justifyContent:"space-between",
    border:groupLevel?"1px dashed rgba(150,102,227,.3)":undefined}}
    onClick={()=>onPick({code:node.sector_code,level:node.level,name:node.name})}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
      <span className="chip chip-code" style={{margin:0,fontSize:".6rem"}}>{node.sector_code}</span>
      {outlook&&outlook.dominant_sentiment&&
        <span className={"chip "+sentimentChip(outlook.dominant_sentiment)} style={{margin:0,fontSize:".6rem"}}>{outlook.dominant_sentiment}</span>}
    </div>
    <div style={{fontSize:".95rem",fontWeight:600,letterSpacing:"-.01em",lineHeight:1.3,marginTop:10}}>
      {groupLevel?(node.name+" — Group Overview"):node.name}
    </div>
  </button>;
}

function SectorContents({sector,groups,outlookMap,onPick}){
  if(!sector)return null;
  const ov=outlookMap[sector.sector_code];
  return <div className="fadeUp">
    <button className="tile" style={{width:"100%",padding:"20px 22px",marginBottom:8,display:"flex",
      alignItems:"center",justifyContent:"space-between",gap:14,
      background:"linear-gradient(135deg,rgba(150,102,227,.12),rgba(24,146,243,.06))"}}
      onClick={()=>onPick({code:sector.sector_code,level:"SE",name:sector.name})}>
      <div>
        <div className="lbl" style={{marginBottom:6}}>Sector Overview</div>
        <div style={{fontSize:"1.2rem",fontWeight:700}}>{sector.name}</div>
      </div>
      <div style={{textAlign:"right"}}>
        {ov&&ov.dominant_sentiment&&<span className={"chip "+sentimentChip(ov.dominant_sentiment)} style={{margin:0}}>{ov.dominant_sentiment}</span>}
        <div style={{color:B,fontSize:".85rem",fontWeight:600,marginTop:6}}>View →</div>
      </div>
    </button>
    {groups.map(g=>(
      <div key={g.group.sector_code}>
        <div className="grpHead">{g.group.name}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:14}}>
          <SectorTile node={g.group} outlook={outlookMap[g.group.sector_code]} onPick={onPick} groupLevel/>
          {g.industries.map(ind=>(
            <SectorTile key={ind.sector_code} node={ind} outlook={outlookMap[ind.sector_code]} onPick={onPick}/>
          ))}
        </div>
      </div>
    ))}
  </div>;
}

function ForceList({title,items,kind}){
  if(!items||!items.length)return null;
  const bar=kind==="tail"?"#4ade80":"#f87171";
  return <div className="card" style={{padding:"20px 22px"}}>
    <div className="sectionTitle" style={{marginBottom:12,color:kind==="tail"?"#4ade80":"#f87171"}}>{title}</div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {items.map((it,i)=>(
        <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:bar,marginTop:8,flexShrink:0}}></span>
          <span className="jval">{typeof it==="string"?it:(it.text||it.title||JSON.stringify(it))}</span>
        </div>
      ))}
    </div>
  </div>;
}

function SignalList({title,obj}){
  const entries=Object.entries(obj||{});
  if(!entries.length)return null;
  return <div className="card" style={{padding:"20px 22px",marginBottom:16}}>
    <div className="sectionTitle gt-purple" style={{marginBottom:12}}>{title}</div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {entries.map(([code,note])=>(
        <div key={code} style={{display:"flex",gap:12,alignItems:"flex-start",flexWrap:"wrap"}}>
          <span className="chip chip-code" style={{margin:0,marginTop:2}}>{code}</span>
          <span className="jval" style={{flex:1,minWidth:200}}>{String(note)}</span>
        </div>
      ))}
    </div>
  </div>;
}

function ViewpointCard({v}){
  return <div className="card fadeUp" style={{padding:"18px 20px",marginBottom:12}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
      <div style={{fontWeight:700,fontSize:"1rem",lineHeight:1.4,flex:1,minWidth:220}}>{v.viewpoint_title}</div>
      {v.stance&&<span className={"chip "+stanceChip(v.stance)} style={{margin:0}}>{STANCE_LABEL[v.stance]||titleCase(v.stance)}</span>}
    </div>
    {v.viewpoint_description&&<p className="jval" style={{marginTop:10}}>{v.viewpoint_description}</p>}
    <div style={{fontSize:".74rem",color:"rgba(255,255,255,.4)",marginTop:12,display:"flex",gap:10,flexWrap:"wrap"}}>
      {v.source_firm&&<span style={{color:"rgba(150,102,227,.85)",fontWeight:600}}>{titleCase(v.source_firm)}</span>}
      {v.source_date&&<><span>·</span><span>{fmtDate(v.source_date)}</span></>}
      {v._inherited&&<><span>·</span><span style={{fontStyle:"italic"}}>{v._inherited}</span></>}
    </div>
  </div>;
}

function SectorDetail({item}){
  const ol=item.outlook;
  const vps=item.viewpoints||[];
  const macroSig=asObject(ol&&ol.macro_signals);
  const commSig=asObject(ol&&ol.commodity_signals);
  const tail=asArray(ol&&ol.tailwinds);
  const head=asArray(ol&&ol.headwinds);
  return <div className="fadeUp">
    <div className="card" style={{padding:"26px 26px",marginBottom:18,
      background:"linear-gradient(135deg,rgba(150,102,227,.12),rgba(24,146,243,.06))"}}>
      <div className="lbl" style={{marginBottom:8}}>{LEVEL_LABEL[item.level]||"Sector"}</div>
      <h1 style={{fontSize:"2rem",fontWeight:800,letterSpacing:"-.02em",lineHeight:1.1}} className="gt">{item.name}</h1>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:14,alignItems:"center"}}>
        <span className="chip chip-code" style={{margin:0}}>{item.code}</span>
        {ol&&ol.dominant_sentiment&&<span className={"chip "+sentimentChip(ol.dominant_sentiment)} style={{margin:0}}>{ol.dominant_sentiment}</span>}
        {ol&&ol.generated_at&&<span style={{fontSize:".78rem",color:"rgba(255,255,255,.45)"}}>Outlook generated {fmtDateTime(ol.generated_at)}</span>}
      </div>
    </div>
    {ol&&ol.outlook_text&&
      <div className="card" style={{padding:"20px 22px",marginBottom:16}}>
        <div className="sectionTitle gt-purple" style={{marginBottom:10}}>Outlook</div>
        <p className="jval">{ol.outlook_text}</p>
      </div>}
    {(tail.length||head.length)>0&&
      <div className="twcol" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <ForceList title="Tailwinds" items={tail} kind="tail"/>
        <ForceList title="Headwinds" items={head} kind="head"/>
      </div>}
    <SignalList title="Macro Signals" obj={macroSig}/>
    <SignalList title="Commodity Signals" obj={commSig}/>
    <div style={{marginTop:6}}>
      <div className="sectionTitle gt-purple" style={{marginBottom:14}}>
        Sector Viewpoints {vps.length?("("+vps.length+")"):""}
      </div>
      {!vps.length&&
        <div className="card" style={{padding:18,color:"rgba(255,255,255,.45)"}}>No analyst viewpoints recorded for this scope yet.</div>}
      {vps.map(v=><ViewpointCard key={v.id} v={v}/>)}
    </div>
    {!ol&&!vps.length&&
      <div className="card" style={{padding:18,color:"rgba(255,255,255,.45)",marginTop:14}}>
        No outlook or viewpoints are currently available for this scope.
      </div>}
  </div>;
}

function CardGrid({items,onPick}){
  return <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:16}}>
    {items.map(it=>(
      <button key={it.key} className="tile fadeUp" style={{padding:"20px 20px",minHeight:108,
        display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={()=>onPick(it)}>
        <div>
          <div style={{fontSize:"1rem",fontWeight:700,letterSpacing:"-.01em",lineHeight:1.3}}>{it.label}</div>
          {it.count!=null&&<div style={{fontSize:".78rem",color:"rgba(255,255,255,.4)",marginTop:4}}>{it.count} {it.count===1?"item":"items"}</div>}
        </div>
      </button>
    ))}
  </div>;
}

/* ════════════════════ Detail view ════════════════════ */
function Detail({kind,item}){
  const meta=kind==="commodity"?COMMODITY_META:MACRO_META;
  const fields=(kind==="commodity"?COMMODITY_FIELDS:MACRO_FIELDS).filter(f=>!meta.includes(f));
  return <div className="fadeUp">
    <div className="card" style={{padding:"26px 26px",marginBottom:18,
      background:"linear-gradient(135deg,rgba(150,102,227,.12),rgba(24,146,243,.06))"}}>
      <div className="lbl" style={{marginBottom:8}}>{kind==="commodity"?"Commodity":"Macro Indicator"}</div>
      <h1 style={{fontSize:"2rem",fontWeight:800,letterSpacing:"-.02em",lineHeight:1.1}} className="gt">{item.name}</h1>
      <div style={{display:"flex",gap:18,flexWrap:"wrap",marginTop:14,fontSize:".82rem",color:"rgba(255,255,255,.55)"}}>
        {meta.filter(m=>m!=="name"&&item[m]).map(m=>(
          <div key={m}><span style={{color:"rgba(255,255,255,.35)"}}>{titleCase(m)}: </span>
            <span style={{color:"#fff",fontWeight:600}}>{m.includes("enriched")?fmtDateTime(item[m]):String(item[m])}</span></div>
        ))}
      </div>
    </div>
    {fields.map(f=><DetailField key={f} label={titleCase(f)} value={item[f]}/>)}
  </div>;
}

/* ════════════════════ App ════════════════════ */
function App(){
  // catalogues
  const [commodities,setCommodities]=useState([]);
  const [macros,setMacros]=useState([]);
  const [sectorMaster,setSectorMaster]=useState([]);   // all sector_master rows
  const [outlookMap,setOutlookMap]=useState({});        // scope_code -> sectoral_outlook row
  const [catErr,setCatErr]=useState(null);
  // navigation: level = 'root' | 'category' | 'items' | 'detail'
  const [kind,setKind]=useState(null);        // 'commodity' | 'macro'
  const [group,setGroup]=useState(null);      // group label
  const [selected,setSelected]=useState(null);// full row
  const [loadingDetail,setLoadingDetail]=useState(false);
  // news
  const [breaking,setBreaking]=useState([]);
  const [itemNews,setItemNews]=useState([]);
  const [newsLoading,setNewsLoading]=useState(true);

  /* initial load: catalogues + breaking news */
  useEffect(()=>{
    (async()=>{
      const [c,m,sm,ol]=await Promise.all([
        sb.from("commodity_catalogue").select("commodity_id,name,category,last_enriched_at").order("name"),
        sb.from("indian_macros_catalogue").select("uid,name,frequency,last_enriched_at").order("name"),
        sb.from("sector_master").select("sector_code,name,level,parent_code,sort_order").order("sort_order"),
        sb.from("sectoral_outlook").select("*"),
      ]);
      if(c.error||m.error||sm.error||ol.error)setCatErr((c.error||m.error||sm.error||ol.error).message);
      setCommodities(c.data||[]);
      setMacros(m.data||[]);
      setSectorMaster(sm.data||[]);
      const omap={};(ol.data||[]).forEach(r=>{omap[r.scope_code]=r;});
      setOutlookMap(omap);
    })();
  },[]);
  useEffect(()=>{
    (async()=>{
      setNewsLoading(true);
      const {data}=await sb.from("news_feed")
        .select("id,title,url,snippet,source_name,published_at,published")
        .eq("breaking_news",true)
        .order("published_at",{ascending:false,nullsFirst:false})
        .limit(60);
      setBreaking(data||[]);
      setNewsLoading(false);
    })();
  },[]);

  /* build groups for current kind */
  const groups=useMemo(()=>{
    if(kind==="commodity"){
      const counts={};
      commodities.forEach(c=>{const g=commodityGroupFor(c.category);counts[g]=(counts[g]||0)+1;});
      return COMMODITY_GROUPS.concat([{label:"Other",emoji:"•"}])
        .filter(g=>counts[g.label]).map(g=>({key:g.label,label:g.label,emoji:g.emoji,count:counts[g.label]}));
    }
    if(kind==="macro"){
      const counts={};
      macros.forEach(m=>{const g=macroGroupFor(m.uid);counts[g]=(counts[g]||0)+1;});
      return MACRO_GROUPS.concat([{label:"Other",emoji:"•"}])
        .filter(g=>counts[g.label]).map(g=>({key:g.label,label:g.label,emoji:g.emoji,count:counts[g.label]}));
    }
    return [];
  },[kind,commodities,macros]);

  /* items within selected group */
  const groupItems=useMemo(()=>{
    if(!kind||!group)return [];
    if(kind==="commodity")
      return commodities.filter(c=>commodityGroupFor(c.category)===group)
        .map(c=>({key:c.commodity_id,label:c.name,raw:c}));
    return macros.filter(m=>macroGroupFor(m.uid)===group)
      .map(m=>({key:m.uid,label:m.name,raw:m}));
  },[kind,group,commodities,macros]);

  /* ── sector lookups ── */
  const byCode=useMemo(()=>{
    const mp={};sectorMaster.forEach(r=>{mp[r.sector_code]=r;});return mp;
  },[sectorMaster]);
  const sectors=useMemo(()=>{
    return sectorMaster.filter(r=>r.level==="SE").map(s=>({
      ...s,
      industryCount:sectorMaster.filter(r=>r.level==="IN"&&r.sector_code.startsWith("IN"+s.sector_code.slice(2))).length
    }));
  },[sectorMaster]);
  const sectorGroups=useMemo(()=>{
    if(kind!=="sector"||!group)return [];
    return sectorMaster.filter(r=>r.level==="IG"&&r.parent_code===group)
      .sort((a,b)=>(a.sort_order||0)-(b.sort_order||0))
      .map(g=>({
        group:g,
        industries:sectorMaster.filter(r=>r.level==="IN"&&r.parent_code===g.sector_code)
          .sort((a,b)=>(a.sort_order||0)-(b.sort_order||0))
      }));
  },[kind,group,sectorMaster]);
  const ancestors=useCallback((code)=>{
    const out=[];let cur=byCode[code];let guard=0;
    while(cur&&guard++<6){out.push(cur.sector_code);cur=cur.parent_code?byCode[cur.parent_code]:null;}
    return out;
  },[byCode]);

  /* select an item -> fetch full row + related news */
  const openItem=useCallback(async(it)=>{
    // ── sector scope ──
    if(kind==="sector"){
      setLoadingDetail(true);setSelected({name:it.name,_loading:true});
      const codes=ancestors(it.code);
      const {data:vp,error}=await sb.from("sector_viewpoints")
        .select("id,sector_code,geography,source_firm,source_date,viewpoint_title,viewpoint_description,stance")
        .in("sector_code",codes)
        .order("source_date",{ascending:false,nullsFirst:false});
      const vps=(vp||[]).map(v=>{
        if(v.sector_code!==it.code){
          const anc=byCode[v.sector_code];
          return {...v,_inherited:"Inherited from "+(anc?anc.name:v.sector_code)};
        }
        return v;
      });
      setSelected({code:it.code,level:it.level,name:it.name,
        outlook:outlookMap[it.code]||null,
        viewpoints:error?[]:vps,_error:error?error.message:null});
      setLoadingDetail(false);
      // related news via sector_tags
      setNewsLoading(true);setItemNews([]);
      const {data:nd}=await sb.from("news_feed")
        .select("id,title,url,snippet,source_name,published_at,published,sector_tags")
        .not("sector_tags","is",null)
        .order("published_at",{ascending:false,nullsFirst:false})
        .limit(800);
      const matched=(nd||[]).filter(n=>newsMatchesItem(n.sector_tags,it.name)).slice(0,60);
      setItemNews(matched);
      setNewsLoading(false);
      return;
    }
    setLoadingDetail(true);setSelected({name:it.label,_loading:true});
    const table=kind==="commodity"?"commodity_catalogue":"indian_macros_catalogue";
    const idCol=kind==="commodity"?"commodity_id":"uid";
    const idVal=kind==="commodity"?it.raw.commodity_id:it.raw.uid;
    const fields=(kind==="commodity"?COMMODITY_FIELDS:MACRO_FIELDS).join(",");
    const {data,error}=await sb.from(table).select(fields).eq(idCol,idVal).limit(1).maybeSingle();
    setSelected(error?{name:it.label,_error:error.message}:data);
    setLoadingDetail(false);
    // related news
    setNewsLoading(true);setItemNews([]);
    const tagCol=kind==="commodity"?"commodity_tags":"macro_tags";
    const {data:nd}=await sb.from("news_feed")
      .select("id,title,url,snippet,source_name,published_at,published,"+tagCol)
      .not(tagCol,"is",null)
      .order("published_at",{ascending:false,nullsFirst:false})
      .limit(800);
    const matched=(nd||[]).filter(n=>newsMatchesItem(n[tagCol],it.label)).slice(0,60);
    setItemNews(matched);
    setNewsLoading(false);
  },[kind,ancestors,byCode,outlookMap]);

  /* navigation helpers */
  const goRoot=()=>{setKind(null);setGroup(null);setSelected(null);};
  const goKind=(k)=>{setKind(k);setGroup(null);setSelected(null);};
  const goGroup=(g)=>{setGroup(g.key);setSelected(null);};
  const goSector=(s)=>{setGroup(s.sector_code);setSelected(null);};
  const backFromDetail=()=>{setSelected(null);};

  const level = selected?"detail":group?"items":kind?"category":"root";
  const sidebarMode = selected&&!selected._loading&&!selected._error?"item":"breaking";
  const sidebarNews = sidebarMode==="item"?itemNews:breaking;

  return <div>
    {/* top bar */}
    <header style={{position:"sticky",top:0,zIndex:500,backdropFilter:"blur(14px)",
      background:"rgba(0,0,0,.6)",borderBottom:"1px solid rgba(255,255,255,.08)"}}>
      <div style={{maxWidth:1400,margin:"0 auto",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <img src="logo_white.png" alt="Swerve" style={{height:26}} onError={e=>{e.target.style.display="none"}}/>
          <div style={{height:20,width:1,background:"rgba(255,255,255,.15)"}}></div>
          <span style={{fontWeight:700,letterSpacing:"-.01em",fontSize:".98rem"}} className="gt">Research</span>
        </div>
        <a href="research.html" onClick={e=>{e.preventDefault();goRoot();}} style={{textDecoration:"none",color:"rgba(255,255,255,.6)",fontSize:".85rem",fontWeight:500}}>← Back to site</a>
      </div>
    </header>

    <div style={{maxWidth:1400,margin:"0 auto",padding:"26px 24px"}}>
      {/* page heading */}
      <div style={{marginBottom:22}}>
        <div className="lbl" style={{marginBottom:8}}>Swerve · Research Terminal</div>
        <h1 style={{fontSize:"clamp(1.7rem,3.6vw,2.6rem)",fontWeight:800,letterSpacing:"-.03em",lineHeight:1.05}}>
          <span className="gt">Macro, Commodity & Sector </span><span className="gt-purple">Research</span>
        </h1>
      </div>

      {/* breadcrumb */}
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:22,fontSize:".85rem"}}>
        <button className="crumb" onClick={goRoot}>Home</button>
        {kind&&<><span style={{color:"rgba(255,255,255,.25)"}}>/</span>
          <button className="crumb" onClick={()=>goKind(kind)}>{kind==="commodity"?"Commodities":kind==="macro"?"Macros":"Sectors"}</button></>}
        {group&&<><span style={{color:"rgba(255,255,255,.25)"}}>/</span>
          <button className="crumb" onClick={()=>setSelected(null)}>{kind==="sector"?(byCode[group]?.name||group):group}</button></>}
        {selected&&<><span style={{color:"rgba(255,255,255,.25)"}}>/</span>
          <span style={{color:"#fff",fontWeight:600}}>{selected.name}</span></>}
      </div>

      {catErr&&<div className="card" style={{padding:16,marginBottom:16,color:"#f87171"}}>Failed to load catalogue: {catErr}</div>}

      {/* main layout: content + news sidebar */}
      <div className="layout" style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:22,alignItems:"start"}}>
        <main style={{minWidth:0}}>
          {level==="root"&&<BigChoice onPick={goKind}/>}
          {level==="category"&&(
            kind==="sector"
              ? (sectors.length?<SectorGrid sectors={sectors} onPick={goSector}/>:
                 <div style={{color:"rgba(255,255,255,.4)",padding:20}}>Loading sectors…</div>)
              : (groups.length?<CardGrid items={groups} onPick={goGroup}/>:
                 <div style={{color:"rgba(255,255,255,.4)",padding:20}}>Loading categories…</div>)
          )}
          {level==="items"&&(
            kind==="sector"
              ? <SectorContents sector={byCode[group]} groups={sectorGroups} outlookMap={outlookMap} onPick={openItem}/>
              : <CardGrid items={groupItems} onPick={openItem}/>
          )}
          {level==="detail"&&(
            loadingDetail||selected._loading?
              <div style={{display:"flex",alignItems:"center",gap:10,color:"rgba(255,255,255,.5)",padding:30}}>
                <span className="aSpin" style={{width:16,height:16,border:"2px solid rgba(255,255,255,.2)",borderTopColor:P,borderRadius:"50%",display:"inline-block"}}></span>
                Loading {selected.name}…
              </div>
            : selected._error?
              <div className="card" style={{padding:18,color:"#f87171"}}>Error: {selected._error}</div>
            : kind==="sector"?<SectorDetail item={selected}/>:<Detail kind={kind} item={selected}/>
          )}
        </main>
        <NewsSidebar mode={sidebarMode} item={selected} news={sidebarNews} loading={newsLoading}/>
      </div>
    </div>

    <footer style={{maxWidth:1400,margin:"0 auto",padding:"30px 24px",color:"rgba(255,255,255,.3)",fontSize:".78rem"}}>
      Swerve Research · Data from Mirrority macro, commodity & sector catalogues · News auto-tagged in real time.
    </footer>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
